name: MotdLib
version: '1.0.0'
main: io.github.personal.motdlib.MotdLib
api-version: '1.21'
description: Manages server MOTD and icon from organized files with random selection.
authors:
  - aaronfriedlein

commands:
  motd:
    description: Manage the MOTD plugin.
    usage: /motd <reload|set>

permissions:
  motdlib.reload:
    description: Allows the player to reload MotdLib.
    default: op
  motdlib.set:
    description: Allows the player to update the active fixed MOTD at runtime.
    default: op
